<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>UPSChub | Focus Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #3b82f6;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text-secondary: #475569;
      --muted: #64748b;
      --line: #e2e8f0;
      --soft: #eef2ff;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 1px 3px rgba(15, 23, 42, .08), 0 1px 2px rgba(15, 23, 42, .04);
      --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, .08), 0 2px 4px -1px rgba(15, 23, 42, .04);
      --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, .08), 0 4px 6px -2px rgba(15, 23, 42, .04);
      --radius: 16px;
      --radius-sm: 12px;
      --radius-lg: 20px;
      --spacing-xs: 8px;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --spacing-xl: 32px;
    }

    /* ==================== RESET ==================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ==================== APP CONTAINER ==================== */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--spacing-md);
      padding-bottom: var(--spacing-xl);
    }

    /* ==================== TOPBAR ==================== */
    .topbar {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
      padding: var(--spacing-sm) 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      font-weight: 800;
      font-size: 18px;
      color: var(--text);
    }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      box-shadow: var(--shadow-md);
      transition: transform 0.2s ease;
    }

    .brand-badge:hover {
      transform: translateY(-2px);
    }

    .status-pill {
      padding: var(--spacing-xs) var(--spacing-md);
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      box-shadow: var(--shadow);
      white-space: nowrap;
    }

    /* ==================== GRID LAYOUT ==================== */
    .shell {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing-md);
    }

    @media (min-width: 768px) {
      .shell {
        grid-template-columns: 1.2fr 1fr;
        gap: var(--spacing-lg);
      }
    }

    /* ==================== CARD BASE ==================== */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--line);
      padding: var(--spacing-lg);
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
    }

    /* ==================== TASK CARD ==================== */
    .task-card {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .badge-row {
      display: flex;
      gap: var(--spacing-xs);
      flex-wrap: wrap;
    }

    .badge {
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--soft);
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .badge.gray {
      background: #f1f5f9;
      color: #475569;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: var(--spacing-xs);
    }

    .question {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      background: var(--bg);
      padding: var(--spacing-md);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--primary);
    }

    /* ==================== BUTTONS ==================== */
    .controls {
      margin-top: var(--spacing-sm);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-xs);
    }

    .btn {
      height: 44px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.2);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-outline {
      border: 1.5px solid var(--line);
      background: var(--card);
      color: var(--text);
    }

    .btn-outline:hover {
      background: var(--bg);
      border-color: var(--muted);
    }

    .btn-danger {
      border: 1.5px solid #fecaca;
      background: #fef2f2;
      color: var(--danger);
    }

    .btn-danger:hover {
      background: #fee2e2;
      border-color: #fca5a5;
    }

    /* ==================== SIDE PANEL ==================== */
    .side {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    /* ==================== CLOCK CARD ==================== */
    .clock-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--spacing-lg);
    }

    .clock-card .label {
      align-self: flex-start;
      margin-bottom: var(--spacing-md);
    }

    .clock-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--spacing-md) 0;
    }

    .clock {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid var(--line);
      position: relative;
      background: linear-gradient(135deg, #ffffff, #f8fafc);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 10px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hand.hour {
      width: 6px;
      height: 50px;
      background: #1e293b;
      margin-left: -3px;
    }

    .hand.minute {
      width: 4px;
      height: 65px;
      background: #475569;
      margin-left: -2px;
    }

    .hand.second {
      width: 2px;
      height: 75px;
      background: var(--primary);
      margin-left: -1px;
    }

    .center-dot {
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      box-shadow: 0 2px 6px rgba(37, 99, 235, 0.3);
    }

    /* ==================== TIMER CARD ==================== */
    .timer-card {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .timer {
      font-size: 42px;
      text-align: center;
      font-weight: 700;
      color: var(--primary);
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      padding: var(--spacing-sm) 0;
    }

    .timer-sub {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: calc(-1 * var(--spacing-sm));
    }

    .timer-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--spacing-xs);
      margin-top: var(--spacing-xs);
    }

    /* ==================== SWIPE CARD ==================== */
    .swipe-card {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
    }

    .swipe-track {
      position: relative;
      height: 60px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      overflow: hidden;
      cursor: grab;
      user-select: none;
    }

    .swipe-track:active {
      cursor: grabbing;
    }

    .swipe-fill {
      position: absolute;
      height: 100%;
      width: 0%;
      background: linear-gradient(135deg, #bfdbfe, #93c5fd);
      border-radius: var(--radius);
      transition: width 0.1s ease;
    }

    .swipe-thumb {
      position: absolute;
      top: 50%;
      left: 6px;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
      transition: left 0.3s ease, box-shadow 0.2s ease;
      z-index: 10;
    }

    .swipe-thumb:hover {
      box-shadow: 0 6px 16px rgba(37, 99, 235, 0.35);
    }

    .swipe-text {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .swipe-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      margin-top: calc(-1 * var(--spacing-xs));
    }

    /* ==================== LOADING & ERROR ==================== */
    .loading,
    .error {
      width: 100%;
      max-width: 600px;
      padding: var(--spacing-xl);
      text-align: center;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      border: 1px solid var(--line);
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-md);
      color: var(--text-secondary);
    }

    .loading::before {
      content: '';
      width: 40px;
      height: 40px;
      border: 3px solid var(--line);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      color: var(--danger);
      font-weight: 500;
    }

    /* ==================== MODAL ==================== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: var(--spacing-md);
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      background: white;
      padding: var(--spacing-xl);
      border-radius: var(--radius-lg);
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal .check {
      width: 60px;
      height: 60px;
      margin: 0 auto var(--spacing-md);
      background: linear-gradient(135deg, var(--success), #22c55e);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(22, 163, 74, 0.3);
    }

    .modal h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--spacing-sm);
      color: var(--text);
    }

    .modal p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* ==================== UTILITY ==================== */
    .hidden {
      display: none !important;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 767px) {
      .app {
        padding: var(--spacing-sm);
        padding-bottom: var(--spacing-lg);
      }

      .topbar {
        margin-bottom: var(--spacing-md);
      }

      .brand {
        font-size: 16px;
      }

      .brand-badge {
        width: 38px;
        height: 38px;
        font-size: 16px;
      }

      .status-pill {
        font-size: 12px;
        padding: 6px var(--spacing-sm);
      }

      .card {
        padding: var(--spacing-md);
      }

      h1 {
        font-size: 20px;
      }

      .question {
        font-size: 14px;
        padding: var(--spacing-sm);
      }

      .controls,
      .timer-actions {
        grid-template-columns: 1fr;
        gap: var(--spacing-xs);
      }

      .btn {
        height: 42px;
      }

      .clock {
        width: 160px;
        height: 160px;
      }

      .hand.hour {
        height: 45px;
      }

      .hand.minute {
        height: 58px;
      }

      .hand.second {
        height: 68px;
      }

      .timer {
        font-size: 36px;
      }

      .swipe-track {
        height: 56px;
      }

      .swipe-thumb {
        width: 44px;
        height: 44px;
        font-size: 18px;
      }

      .modal {
        padding: var(--spacing-lg);
      }
    }

    @media (max-width: 480px) {
      .topbar {
        flex-wrap: wrap;
        gap: var(--spacing-sm);
      }

      .status-pill {
        width: 100%;
        text-align: center;
      }

      .clock {
        width: 140px;
        height: 140px;
      }

      .hand.hour {
        height: 40px;
      }

      .hand.minute {
        height: 52px;
      }

      .hand.second {
        height: 60px;
      }

      .timer {
        font-size: 32px;
      }

      h1 {
        font-size: 18px;
      }
    }

    @media (min-width: 1024px) {
      .app {
        padding: var(--spacing-lg) var(--spacing-xl);
      }

      .card {
        padding: var(--spacing-xl);
      }

      .clock {
        width: 200px;
        height: 200px;
      }

      .hand.hour {
        height: 55px;
      }

      .hand.minute {
        height: 72px;
      }

      .hand.second {
        height: 82px;
      }

      .timer {
        font-size: 48px;
      }
    }

    /* ==================== SMOOTH TRANSITIONS ==================== */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    .card,
    .btn,
    .badge,
    .brand-badge {
      will-change: transform;
    }

    /* ==================== ACCESSIBILITY ==================== */
    .btn:focus-visible,
    .swipe-thumb:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* ==================== PRINT STYLES ==================== */
    @media print {

      .topbar,
      .controls,
      .timer-actions,
      .swipe-card {
        display: none;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .card {
        box-shadow: none;
        border: 1px solid var(--line);
        page-break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">U</div>
        <div>UPSChub</div>
      </div>
      <div class="status-pill" id="statusPill">Focus Mode</div>
    </div>

    <div id="loadingBox" class="loading">Loading your task...</div>
    <div id="errorBox" class="error hidden"></div>

    <div id="mainUI" class="shell hidden">
      <section class="card task-card">
        <div class="badge-row">
          <span class="badge" id="subjectBadge">Subject</span>
          <span class="badge gray" id="taskIdBadge">Task</span>
        </div>
        <div>
          <div class="label">Topic</div>
          <h1 id="topicName">—</h1>
        </div>
        <div>
          <div class="label">Question</div>
          <p class="question" id="questionText">—</p>
        </div>
        <div class="controls">
          <button class="btn btn-outline" id="backBtn">Back</button>
          <button class="btn btn-outline" id="focusBtn">Focus</button>
          <button class="btn btn-primary" id="doneBtn">Mark Ready</button>
        </div>
      </section>

      <aside class="side">
        <section class="card clock-card">
          <div class="label">Analog Clock</div>
          <div class="clock-wrap">
            <div class="clock" id="clock">
              <div class="hand hour" id="hourHand"></div>
              <div class="hand minute" id="minuteHand"></div>
              <div class="hand second" id="secondHand"></div>
              <div class="center-dot"></div>
            </div>
          </div>
        </section>

        <section class="card timer-card">
          <div class="label">Study Timer</div>
          <div class="timer" id="timerDisplay">00:00:00</div>
          <div class="timer-sub">Auto-starts on page load and saves every second.</div>
          <div class="timer-actions">
            <button class="btn btn-outline" id="pauseBtn">Pause</button>
            <button class="btn btn-primary" id="resumeBtn">Resume</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
          </div>
        </section>

        <section class="card swipe-card">
          <div class="label">Complete Task</div>
          <div class="swipe-track" id="swipeTrack" aria-label="Swipe to complete task">
            <div class="swipe-fill" id="swipeFill"></div>
            <div class="swipe-thumb" id="swipeThumb">→</div>
            <div class="swipe-text" id="swipeText">Swipe to Complete Task</div>
          </div>
          <div class="swipe-hint">Drag the knob to 90% to finish.</div>
        </section>
      </aside>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="check">✓</div>
      <h2>Task Completed</h2>
      <p id="modalText">Great work.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    /* ================= FIREBASE ================= */
    const firebaseConfig = {
      apiKey: "AIzaSyBoPtr3d8se-fcGXkzixG8OE7dFvYjPcs4",
      authDomain: "upscstudyhub-github.firebaseapp.com",
      projectId: "upscstudyhub-github",
      storageBucket: "upscstudyhub-github.firebasestorage.app",
      messagingSenderId: "451692540885",
      appId: "1:451692540885:web:b425e85128e5de97c7c35c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    /* ================= PARAM ================= */
    const params = new URLSearchParams(window.location.search);
    const taskId = params.get("taskId");

    /* ================= UI ================= */
    const loadingBox = document.getElementById("loadingBox");
    const errorBox = document.getElementById("errorBox");
    const mainUI = document.getElementById("mainUI");

    const subjectBadge = document.getElementById("subjectBadge");
    const topicName = document.getElementById("topicName");
    const questionText = document.getElementById("questionText");

    const timerDisplay = document.getElementById("timerDisplay");
    const pauseBtn = document.getElementById("pauseBtn");
    const resumeBtn = document.getElementById("resumeBtn");
    const resetBtn = document.getElementById("resetBtn");

    const swipeTrack = document.getElementById("swipeTrack");
    const swipeFill = document.getElementById("swipeFill");
    const swipeThumb = document.getElementById("swipeThumb");
    const swipeText = document.getElementById("swipeText");

    const hourHand = document.getElementById("hourHand");
    const minuteHand = document.getElementById("minuteHand");
    const secondHand = document.getElementById("secondHand");

    /* ================= STATE ================= */
    let currentUser = null;
    let timerSeconds = 0;
    let timerRunning = true;
    let timerInterval = null;
    let completed = false;

    /* ================= HELPERS ================= */
    function showError(msg) {
      loadingBox.classList.add("hidden");
      mainUI.classList.add("hidden");
      errorBox.textContent = msg;
      errorBox.classList.remove("hidden");
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `${pad(h)}:${pad(m)}:${pad(sec)}`;
    }

    /* ================= TIMER ================= */
    function saveTimer() {
      localStorage.setItem("timer_" + taskId, timerSeconds);
    }

    function loadTimer() {
      return parseInt(localStorage.getItem("timer_" + taskId)) || 0;
    }

    function startTimer() {
      clearInterval(timerInterval);

      timerInterval = setInterval(() => {
        if (!timerRunning || completed) return;

        timerSeconds++;
        timerDisplay.textContent = formatTime(timerSeconds);
        saveTimer();
      }, 1000);
    }

    pauseBtn.onclick = () => { timerRunning = false; };

    resumeBtn.onclick = () => {
      if (!completed) timerRunning = true;
    };

    resetBtn.onclick = () => {
      timerSeconds = 0;
      timerDisplay.textContent = formatTime(timerSeconds);
      saveTimer();
    };

    /* ================= CLOCK ================= */
    function updateClock() {
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const hr = now.getHours() % 12;

      secondHand.style.transform = `rotate(${sec * 6}deg)`;
      minuteHand.style.transform = `rotate(${min * 6}deg)`;
      hourHand.style.transform = `rotate(${hr * 30 + min * 0.5}deg)`;
    }
    setInterval(updateClock, 1000);

    /* ================= LOAD TASK ================= */
    async function loadTask() {
      try {
        const snap = await getDoc(doc(db, "assignments", taskId));
        if (!snap.exists()) throw new Error("Task not found");

        const data = snap.data();
        subjectBadge.textContent = data.subject || "General";
        topicName.textContent = data.topic || "No topic";
        questionText.textContent = data.question || "No question";

        loadingBox.classList.add("hidden");
        mainUI.classList.remove("hidden");

      } catch (e) {
        console.error(e);
        showError("Failed to load task");
      }
    }

    /* ================= COMPLETE ================= */
    async function completeTask() {
      if (completed || !currentUser) return;

      completed = true;
      clearInterval(timerInterval);

      await setDoc(doc(db, "userProgress", currentUser.uid), {
        completed: arrayUnion(taskId),
        [`tasks.${taskId}`]: {
          completedAt: serverTimestamp(),
          studyTime: timerSeconds
        }
      }, { merge: true });

      swipeText.textContent = "Completed ✔";
      swipeFill.style.width = "100%";
    }

    /* ================= SWIPE ================= */
    function initSwipe() {
      let dragging = false;
      let startX = 0;
      let currentX = 0;

      function getX(e) {
        return e.touches ? e.touches[0].clientX : e.clientX;
      }

      function update(x) {
        const rect = swipeTrack.getBoundingClientRect();
        const max = rect.width - swipeThumb.offsetWidth - 6;

        let move = Math.max(0, Math.min(x, max));
        currentX = move;

        const percent = move / max;

        swipeThumb.style.left = move + "px";
        swipeFill.style.width = (percent * 100) + "%";
        swipeText.style.opacity = 1 - percent;

        if (percent >= 0.9) completeTask();
      }

      function start(e) {
        if (completed) return;
        dragging = true;
        startX = getX(e) - currentX;
        swipeThumb.style.transition = "none";
      }

      function move(e) {
        if (!dragging) return;
        update(getX(e) - startX);
      }

      function end() {
        if (!dragging) return;
        dragging = false;

        const rect = swipeTrack.getBoundingClientRect();
        const max = rect.width - swipeThumb.offsetWidth - 6;

        swipeThumb.style.transition = "left 0.3s";

        if (currentX < max * 0.9) {
          swipeThumb.style.left = "6px";
          swipeFill.style.width = "0%";
          swipeText.style.opacity = "1";
          currentX = 0;
        } else {
          swipeThumb.style.left = max + "px";
        }
      }

      swipeThumb.addEventListener("mousedown", start);
      swipeThumb.addEventListener("touchstart", start, { passive: true });

      window.addEventListener("mousemove", move);
      window.addEventListener("touchmove", move, { passive: true });

      window.addEventListener("mouseup", end);
      window.addEventListener("touchend", end);
    }

    /* ================= AUTH ================= */
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace("/assignments/auth.html?redirect=" + encodeURIComponent(window.location.href));
        return;
      }

      currentUser = user;

      await loadTask();

      timerSeconds = loadTimer();
      timerDisplay.textContent = formatTime(timerSeconds);

      startTimer();
      initSwipe();
    });
  </script>
</body>
