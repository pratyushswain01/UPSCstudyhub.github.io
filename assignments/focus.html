<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>UPSChub | Focus Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --soft: #eef2ff;
      --success: #16a34a;
      --danger: #dc2626;
      --shadow: 0 10px 30px rgba(15, 23, 42, .08);
      --shadow-sm: 0 6px 18px rgba(15, 23, 42, .06);
      --radius: 22px;
    }

    /* RESET */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* APP */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 14px 24px;
    }

    /* TOPBAR */
    .topbar {
      width: min(100%, 920px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .brand-badge {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #60a5fa);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .status-pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 12px;
    }

    /* GRID */
    .shell {
      width: min(100%, 920px);
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
    }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    /* TASK */
    .task-card {
      padding: 18px;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--soft);
      font-size: 12px;
    }

    .badge.gray {
      background: #f1f5f9;
      color: #334155;
    }

    .label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
    }

    h1 {
      font-size: 22px;
      margin: 6px 0;
    }

    .question {
      font-size: 14px;
      line-height: 1.6;
    }

    /* BUTTONS */
    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .btn {
      height: 44px;
      border-radius: 12px;
      font-weight: 600;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-outline {
      border: 1px solid var(--line);
      background: white;
    }

    .btn-danger {
      border: 1px solid #fecaca;
      color: var(--danger);
    }

    /* SIDE */
    .side {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* CLOCK */
    .clock {
      width: 160px;
      /* FIXED SMALL */
      height: 160px;
      border-radius: 50%;
      margin: auto;
      border: 1px solid var(--line);
      position: relative;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom;
    }

    .hand.hour {
      width: 5px;
      height: 40px;
      background: black;
    }

    .hand.minute {
      width: 3px;
      height: 55px;
      background: #333;
    }

    .hand.second {
      width: 2px;
      height: 65px;
      background: var(--primary);
    }

    .center-dot {
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* TIMER */
    .timer {
      font-size: 32px;
      text-align: center;
      font-weight: 700;
    }

    .timer-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    /* SWIPE */
    .swipe-track {
      position: relative;
      height: 58px;
      border-radius: 16px;
      background: #f1f5f9;
      overflow: hidden;
    }

    .swipe-fill {
      position: absolute;
      height: 100%;
      width: 0%;
      background: #bfdbfe;
    }

    .swipe-thumb {
      position: absolute;
      top: 50%;
      left: 6px;
      transform: translateY(-50%);
      /* FIXED */
      width: 48px;
      height: 48px;
      background: var(--primary);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .swipe-text {
      position: absolute;
      width: 100%;
      text-align: center;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
    }

    /* LOADING */
    .loading,
    .error {
      width: min(100%, 920px);
      padding: 20px;
      text-align: center;
    }

    .error {
      color: var(--danger);
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal {
      background: white;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    /* RESPONSIVE */
    @media (max-width: 860px) {
      .shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {

      .controls,
      .timer-actions {
        grid-template-columns: 1fr;
      }

      .clock {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="brand-badge">U</div>
        <div>UPSChub</div>
      </div>
      <div class="status-pill" id="statusPill">Focus Mode</div>
    </div>

    <div id="loadingBox" class="loading">Loading your task...</div>
    <div id="errorBox" class="error hidden"></div>

    <div id="mainUI" class="shell hidden">
      <section class="card task-card">
        <div class="badge-row">
          <span class="badge" id="subjectBadge">Subject</span>
          <span class="badge gray" id="taskIdBadge">Task</span>
        </div>
        <div class="label">Topic</div>
        <h1 id="topicName">—</h1>
        <div class="label">Question</div>
        <p class="question" id="questionText">—</p>
        <div class="divider"></div>
        <div class="controls">
          <button class="btn btn-outline" id="backBtn">Back</button>
          <button class="btn btn-outline" id="focusBtn">Focus</button>
          <button class="btn btn-primary" id="doneBtn">Mark Ready</button>
        </div>
      </section>

      <aside class="side">
        <section class="card clock-card">
          <div class="label">Analog Clock</div>
          <div class="clock-wrap">
            <div class="clock" id="clock">
              <div class="hand hour" id="hourHand"></div>
              <div class="hand minute" id="minuteHand"></div>
              <div class="hand second" id="secondHand"></div>
              <div class="center-dot"></div>
            </div>
          </div>
        </section>

        <section class="card timer-card">
          <div class="label">Study Timer</div>
          <div class="timer" id="timerDisplay">00:00:00</div>
          <div class="timer-sub">Auto-starts on page load and saves every second.</div>
          <div class="timer-actions">
            <button class="btn btn-outline" id="pauseBtn">Pause</button>
            <button class="btn btn-primary" id="resumeBtn">Resume</button>
            <button class="btn btn-danger" id="resetBtn">Reset</button>
          </div>
        </section>

        <section class="card swipe-card">
          <div class="label">Complete Task</div>
          <div class="swipe-track" id="swipeTrack" aria-label="Swipe to complete task">
            <div class="swipe-fill" id="swipeFill"></div>
            <div class="swipe-thumb" id="swipeThumb">→</div>
            <div class="swipe-text" id="swipeText">Swipe to Complete Task</div>
          </div>
          <div class="swipe-hint">Drag the knob to 90% to finish.</div>
        </section>
      </aside>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="check">✓</div>
      <h2>Task Completed</h2>
      <p id="modalText">Great work.</p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, arrayUnion, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    /* ================= FIREBASE ================= */
    const firebaseConfig = {
      apiKey: "AIzaSyBoPtr3d8se-fcGXkzixG8OE7dFvYjPcs4",
      authDomain: "upscstudyhub-github.firebaseapp.com",
      projectId: "upscstudyhub-github",
      storageBucket: "upscstudyhub-github.firebasestorage.app",
      messagingSenderId: "451692540885",
      appId: "1:451692540885:web:b425e85128e5de97c7c35c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    /* ================= PARAM ================= */
    const params = new URLSearchParams(window.location.search);
    const taskId = params.get("taskId");

    /* ================= UI ================= */
    const loadingBox = document.getElementById("loadingBox");
    const errorBox = document.getElementById("errorBox");
    const mainUI = document.getElementById("mainUI");

    const subjectBadge = document.getElementById("subjectBadge");
    const topicName = document.getElementById("topicName");
    const questionText = document.getElementById("questionText");

    const timerDisplay = document.getElementById("timerDisplay");
    const pauseBtn = document.getElementById("pauseBtn");
    const resumeBtn = document.getElementById("resumeBtn");
    const resetBtn = document.getElementById("resetBtn");

    const swipeTrack = document.getElementById("swipeTrack");
    const swipeFill = document.getElementById("swipeFill");
    const swipeThumb = document.getElementById("swipeThumb");
    const swipeText = document.getElementById("swipeText");

    const hourHand = document.getElementById("hourHand");
    const minuteHand = document.getElementById("minuteHand");
    const secondHand = document.getElementById("secondHand");

    /* ================= STATE ================= */
    let currentUser = null;
    let timerSeconds = 0;
    let timerRunning = true;
    let timerInterval = null;
    let completed = false;

    /* ================= HELPERS ================= */
    function showError(msg) {
      loadingBox.classList.add("hidden");
      mainUI.classList.add("hidden");
      errorBox.textContent = msg;
      errorBox.classList.remove("hidden");
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function formatTime(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `${pad(h)}:${pad(m)}:${pad(sec)}`;
    }

    /* ================= TIMER ================= */
    function saveTimer() {
      localStorage.setItem("timer_" + taskId, timerSeconds);
    }

    function loadTimer() {
      return parseInt(localStorage.getItem("timer_" + taskId)) || 0;
    }

    function startTimer() {
      clearInterval(timerInterval); // ✅ FIXED

      timerInterval = setInterval(() => {
        if (!timerRunning || completed) return;

        timerSeconds++;
        timerDisplay.textContent = formatTime(timerSeconds);
        saveTimer();
      }, 1000);
    }

    pauseBtn.onclick = () => { timerRunning = false; };

    resumeBtn.onclick = () => {
      if (!completed) timerRunning = true;
    };

    resetBtn.onclick = () => {
      timerSeconds = 0;
      timerDisplay.textContent = formatTime(timerSeconds);
      saveTimer();
    };

    /* ================= CLOCK ================= */
    function updateClock() {
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const hr = now.getHours() % 12;

      secondHand.style.transform = `rotate(${sec * 6}deg)`;
      minuteHand.style.transform = `rotate(${min * 6}deg)`;
      hourHand.style.transform = `rotate(${hr * 30 + min * 0.5}deg)`;
    }
    setInterval(updateClock, 1000);

    /* ================= LOAD TASK ================= */
    async function loadTask() {
      try {
        const snap = await getDoc(doc(db, "assignments", taskId));
        if (!snap.exists()) throw new Error("Task not found");

        const data = snap.data();
        subjectBadge.textContent = data.subject || "General";
        topicName.textContent = data.topic || "No topic";
        questionText.textContent = data.question || "No question";

        loadingBox.classList.add("hidden");
        mainUI.classList.remove("hidden");

      } catch (e) {
        console.error(e);
        showError("Failed to load task");
      }
    }

    /* ================= COMPLETE ================= */
    async function completeTask() {
      if (completed || !currentUser) return;

      completed = true;
      clearInterval(timerInterval);

      await setDoc(doc(db, "userProgress", currentUser.uid), {
        completed: arrayUnion(taskId),
        [`tasks.${taskId}`]: {
          completedAt: serverTimestamp(),
          studyTime: timerSeconds
        }
      }, { merge: true });

      swipeText.textContent = "Completed ✔";
      swipeFill.style.width = "100%";
    }

    /* ================= SWIPE ================= */
    function initSwipe() {
      let dragging = false;
      let startX = 0;
      let currentX = 0;

      function getX(e) {
        return e.touches ? e.touches[0].clientX : e.clientX;
      }

      function update(x) {
        const rect = swipeTrack.getBoundingClientRect();
        const max = rect.width - swipeThumb.offsetWidth - 6;

        let move = Math.max(0, Math.min(x, max));
        currentX = move;

        const percent = move / max;

        swipeThumb.style.left = move + "px";
        swipeFill.style.width = (percent * 100) + "%";
        swipeText.style.opacity = 1 - percent;

        if (percent >= 0.9) completeTask();
      }

      function start(e) {
        if (completed) return;
        dragging = true;
        startX = getX(e) - currentX;
        swipeThumb.style.transition = "none";
      }

      function move(e) {
        if (!dragging) return;
        update(getX(e) - startX);
      }

      function end() {
        if (!dragging) return;
        dragging = false;

        const rect = swipeTrack.getBoundingClientRect();
        const max = rect.width - swipeThumb.offsetWidth - 6;

        swipeThumb.style.transition = "left 0.3s";

        if (currentX < max * 0.9) {
          swipeThumb.style.left = "6px";
          swipeFill.style.width = "0%";
          swipeText.style.opacity = "1";
          currentX = 0;
        } else {
          swipeThumb.style.left = max + "px";
        }
      }

      swipeThumb.addEventListener("mousedown", start);
      swipeThumb.addEventListener("touchstart", start, { passive: true });

      window.addEventListener("mousemove", move);
      window.addEventListener("touchmove", move, { passive: true });

      window.addEventListener("mouseup", end);
      window.addEventListener("touchend", end);
    }

    /* ================= AUTH ================= */
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.replace("/assignments/auth.html?redirect=" + encodeURIComponent(window.location.href));
        return;
      }

      currentUser = user;

      await loadTask();

      timerSeconds = loadTimer();
      timerDisplay.textContent = formatTime(timerSeconds);

      startTimer();
      initSwipe();
    });
  </script>






</body>

</html>
