<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subjects | UPSChub Datasheet</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --primary: #007bff;
            --primary-dark: #0056b3;
            --secondary: #6c757d;
            --border: #dee2e6;
            --shadow: rgba(0, 0, 0, 0.1);
            --gradient-start: #007bff;
            --gradient-end: #00c6ff;
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --border: #333333;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .theme-toggle {
            padding: 0.5rem;
            background-color: var(--card);
            border-radius: 999px;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            margin-bottom: 1.5rem;
        }

        .search-bar input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background-color: var(--card);
            color: var(--text);
            font-size: 1rem;
        }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .subject-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1rem;
            box-shadow: 0 4px 12px var(--shadow);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        [data-theme="dark"] .subject-card {
            background: rgba(30, 30, 30, 0.95);
            border-color: #333;
        }

        .subject-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .subject-header {
            display: flex;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .subject-icon {
            font-size: 1.8rem;
            margin-right: 0.75rem;
        }

        .subject-title {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .subject-meta {
            font-size: 0.9rem;
            opacity: 0.75;
            margin-top: 0.2rem;
        }




        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }





        .progress-container {
            margin-bottom: 0.8rem;
            font-size: 0.9rem; 
            
            opacity: 0.85;
        }

        .progress-bar {
            height: 6px;
            border-radius: 4px;
            background-color: #e9ecef;
            margin-top: 0.3rem;
            overflow: hidden;
        }

        [data-theme="dark"] .progress-bar {
            background-color: #333;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            width: 30%;
        }

        .card-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .continue-btn {
            padding: 0.5rem 1rem;
            border-radius: 12px;
            border: none;
            background-color: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.25s ease;
        }

        .continue-btn:hover {
            background-color: var(--primary-dark);
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 0.875rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background-color: var(--card);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .filter-btn.active {
            border-color: var(--primary);
            background-color: rgba(0, 123, 255, 0.15);
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 1.2rem;
            }

            .search-bar {
                max-width: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">UPSChub Datasheet</div>
            <button class="theme-toggle" id="themeToggle">🌓</button>
        </header>

        <h1 class="header-title">Choose a Subject</h1>

        <div class="search-bar">
            <input type="text" placeholder="Search subjects..." id="searchInput" />
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="core">Core</button>
            <button class="filter-btn" data-filter="history">History</button>
            <button class="filter-btn" data-filter="optional">Optional</button>
        </div>

        <div class="subject-grid" id="subjectGrid">
            <!-- SKELETON LOADER -->
            <div class="subject-card">
                <div class="subject-header">
                    <div class="subject-icon skeleton" style="width: 28px; height: 28px;"></div>
                    <div class="subject-title skeleton" style="width: 120px; height: 20px;"></div>
                </div>
                <div class="subject-meta skeleton" style="width: 180px; height: 16px; margin-top: 12px;"></div>
                <div class="progress-container skeleton" style="width: 100%; height: 16px; margin-top: 12px;"></div>
            </div>
            <div class="subject-card">
                <div class="subject-header">
                    <div class="subject-icon skeleton" style="width: 28px; height: 28px;"></div>
                    <div class="subject-title skeleton" style="width: 120px; height: 20px;"></div>
                </div>
                <div class="subject-meta skeleton" style="width: 180px; height: 16px; margin-top: 12px;"></div>
                <div class="progress-container skeleton" style="width: 100%; height: 16px; margin-top: 12px;"></div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBoPtr3d8se-fcGXkzixG8OE7dFvYjPcs4",
            authDomain: "upscstudyhub-github.firebaseapp.com",
            databaseURL: "https://upscstudyhub-github-default-rtdb.firebaseio.com",
            projectId: "upscstudyhub-github",
            storageBucket: "upscstudyhub-github.firebasestorage.app",
            messagingSenderId: "451692540885",
            appId: "1:451692540885:web:b425e85128e5de97c7c35c",
            measurementId: "G-33F0XSLP53"
        };

        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.firestore();

        const toast = document.getElementById("toast");

        function showNotification(text) {
            toast.textContent = text;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
        }

        function toggleTheme() {
            const theme = localStorage.getItem("theme") || "light";
            applyTheme(theme === "dark" ? "light" : "dark");
        }

        document.getElementById("themeToggle").onclick = toggleTheme;

        const savedTheme = localStorage.getItem("theme") || "light";
        applyTheme(savedTheme);

        // Subject mock data
        const subjects = [
            {
                id: "polity",
                name: "Polity",
                icon: "🏛️",
                totalChapters: 12,
                completedChapters: 3,
                resources: 180,
                type: "core"
            },
            {
                id: "geography",
                name: "Geography",
                icon: "🌍",
                totalChapters: 15,
                completedChapters: 6,
                resources: 210,
                type: "core"
            },
            {
                id: "history",
                name: "History",
                icon: "📜",
                totalChapters: 24,
                completedChapters: 10,
                resources: 320,
                type: "history"
            },
            {
                id: "economy",
                name: "Economy",
                icon: "💰",
                totalChapters: 18,
                completedChapters: 8,
                resources: 240,
                type: "core"
            },
            {
                id: "political-science",
                name: "Political Science (Optional)",
                icon: "🗳️",
                totalChapters: 20,
                completedChapters: 5,
                resources: 160,
                type: "optional"
            }
        ];

        const subjectGrid = document.getElementById("subjectGrid");
        const searchInput = document.getElementById("searchInput");
        const filterButtons = document.querySelectorAll(".filter-btn");
        let currentFilter = "all";

        function renderSubjects(filter = "all", search = "") {
            subjectGrid.innerHTML = "";
            const filtered = subjects.filter(sub => {
                const matchesSearch = !search || sub.name.toLowerCase().includes(search.toLowerCase());
                const matchesFilter = filter === "all" || sub.type === filter;
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                subjectGrid.innerHTML = "<p>No subjects found.</p>";
                return;
            }

            filtered.forEach(sub => {
                const progress = sub.totalChapters > 0 ? (sub.completedChapters / sub.totalChapters) * 100 : 0;

                const card = document.createElement("div");
                card.className = "subject-card";
                card.innerHTML = `
          <div class="subject-header">
            <div class="subject-icon">${sub.icon}</div>
            <div class="subject-title">${sub.name}</div>
          </div>
          <div class="subject-meta">
            ${sub.totalChapters} chapters • ${sub.resources} resources • 
            ${sub.completedChapters} completed
          </div>
          <div class="progress-container">
            Completed: ${sub.completedChapters} / ${sub.totalChapters}
            <div class="progress-bar">
              <div class="progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>
          <div class="card-footer">
            <button class="continue-btn" data-subject="${sub.id}">Continue</button>
          </div>
        `;
                subjectGrid.appendChild(card);

                card.querySelector(".continue-btn").addEventListener("click", () => {
                    localStorage.setItem("currentSubject", sub.id);
                    localStorage.setItem("currentSubjectName", sub.name);
                    showNotification(`Loading ${sub.name}...`);
                    setTimeout(() => window.location.href = "chapters.html", 1000);
                });
            });
        }

        // Load on page open
        window.addEventListener("DOMContentLoaded", () => {
            renderSubjects();
        });

        searchInput.addEventListener("input", () => {
            renderSubjects(currentFilter, searchInput.value);
        });

        filterButtons.forEach(btn => {
            btn.addEventListener("click", () => {
                currentFilter = btn.dataset.filter;
                filterButtons.forEach(b => b.classList.toggle("active", b.dataset.filter === currentFilter));
                renderSubjects(currentFilter, searchInput.value);
            });
        });

        // Auth check
        auth.onAuthStateChanged(user => {
            if (!user) {
                showNotification("Session expired. Redirecting to login...");
                setTimeout(() => window.location.href = "index.html", 1500);
            }
        });
    </script>
</body>

</html>
