<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UPSChub Planner Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {

            --primary: #007bff;
            --primary-dark: #0056cc;
            --bg: #f3f7fd;
            --card: #ffffff;
            --text: #1b1b1b;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.08);

        }

        body {

            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;

        }

        .header {

            background: linear-gradient(135deg, #001b44, #003b95);
            padding: 30px 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);

        }

        .header h1 {

            font-size: 35px;
            font-weight: 700;

        }

        .header p {

            margin-top: 8px;
            opacity: 0.9;
            font-size: 15px;

        }

        .container {

            max-width: 1500px;
            margin: auto;
            padding: 20px;

        }

        .stats-grid {

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;

        }

        .stat-card {

            background: var(--card);
            border-radius: 18px;
            padding: 22px;
            box-shadow: var(--shadow);
            transition: 0.3s;

        }

        .stat-card:hover {

            transform: translateY(-5px);

        }

        .stat-title {

            font-size: 14px;
            color: #666;

        }

        .stat-value {

            font-size: 30px;
            font-weight: 700;
            margin-top: 10px;
            color: var(--primary);

        }

        .top-bar {

            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;

        }

        .search-box {

            flex: 1;
            min-width: 250px;

        }

        .search-box input {

            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            outline: none;
            background: white;
            box-shadow: var(--shadow);
            font-size: 15px;

        }

        .download-btn {

            background: var(--primary);
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;

        }

        .download-btn:hover {

            background: var(--primary-dark);

        }

        .table-wrapper {

            background: white;
            border-radius: 20px;
            overflow: hidden;
            overflow-x: auto;
            box-shadow: var(--shadow);

        }

        table {

            width: 100%;
            border-collapse: collapse;
            min-width: 900px;

        }

        thead {

            background: var(--primary);
            color: white;

        }

        th {

            padding: 18px;
            font-size: 14px;
            text-align: left;
            white-space: nowrap;

        }

        td {

            padding: 18px;
            border-bottom: 1px solid #eee;
            font-size: 14px;

        }

        tr:hover {

            background: #f8fbff;

        }

        .status {

            padding: 8px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;

        }

        .done {

            background: #d4f8e8;
            color: #008a4e;

        }

        .pending {

            background: #fff3cd;
            color: #a66b00;

        }

        .live-badge {

            background: #e7f1ff;
            color: var(--primary);
            padding: 10px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;

        }

        .dot {

            width: 10px;
            height: 10px;
            background: #00d26a;
            border-radius: 50%;
            animation: pulse 1s infinite;

        }

        @keyframes pulse {

            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }

        }

        .footer {

            text-align: center;
            padding: 25px;
            color: #666;
            font-size: 14px;

        }

        .loading {

            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: var(--primary);

        }

        @media(max-width:768px) {

            .header h1 {

                font-size: 28px;

            }

            .top-bar {

                flex-direction: column;
                align-items: stretch;

            }

            .download-btn {

                width: 100%;
                text-align: center;

            }

        }
    </style>

</head>

<body>

    <div class="header">

        <h1>UPSChub Planner Dashboard</h1>

        <p>
            Mission UPSC 2028 • Smart Study Planner • Real-Time Tracker
        </p>

    </div>

    <div class="container">

        <div class="stats-grid">

            <div class="stat-card">

                <div class="stat-title">Total Planner Entries</div>

                <div class="stat-value" id="totalEntries">0</div>

            </div>

            <div class="stat-card">

                <div class="stat-title">Subjects Covered</div>

                <div class="stat-value" id="subjectCount">0</div>

            </div>

            <div class="stat-card">

                <div class="stat-title">Live Sync Status</div>

                <div class="live-badge">
                    <div class="dot"></div>
                    Live Synced
                </div>

            </div>

            <div class="stat-card">

                <div class="stat-title">Monthly Tracker</div>

                <a href="monthly-tracker.pdf" download class="download-btn">
                    Download PDF
                </a>

            </div>

        </div>

        <div class="top-bar">

            <div class="search-box">

                <input type="text" id="searchInput" placeholder="Search subject, chapter or date...">

            </div>

        </div>

        <div class="table-wrapper">

            <div class="loading" id="loading">
                Loading Planner...
            </div>

            <table>

                <thead id="tableHead"></thead>

                <tbody id="tableBody"></tbody>

            </table>

        </div>

    </div>

    <div class="footer">

        UPSChub © 2026 • Advanced UPSC Planner Ecosystem

    </div>

    <script>

        const API_KEY =
            "AIzaSyA3OcSW6qV-gfQEV2NVT0QEfzbt53kUVRc";

        const SHEET_ID =
            "1zaUOi3WDvBoBhCOEOZaRQgSYGVob9ktcbOTPYlG6v-s";

        const RANGE = "A5:E100";

        const url =
            `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;

        let allRows = [];

        async function loadPlanner() {

            try {

                const response = await fetch(url);

                const data = await response.json();

                const rows = data.values;

                allRows = rows;

                generateTable(rows);

                generateStats(rows);

                document.getElementById("loading").style.display = "none";

            }

            catch (error) {

                console.log(error);

                document.getElementById("loading").innerHTML =
                    "Failed to load planner.";

            }

        }

        function generateTable(rows) {

            const head = document.getElementById("tableHead");

            const body = document.getElementById("tableBody");

            head.innerHTML = "";
            body.innerHTML = "";

            let headHTML = "<tr>";

            rows[0].forEach(col => {

                headHTML += `<th>${col}</th>`;

            });

            headHTML += "</tr>";

            head.innerHTML = headHTML;

            for (let i = 1; i < rows.length; i++) {

                let rowHTML = "<tr>";

                rows[i].forEach((cell, index) => {

                    if (index === rows[i].length - 1) {

                        rowHTML += `<td>
                        <span class="status pending">
                        ${cell}
                        </span>
                        </td>`;

                    }

                    else {

                        rowHTML += `<td>${cell}</td>`;

                    }

                });

                rowHTML += "</tr>";

                body.innerHTML += rowHTML;

            }

        }

        function generateStats(rows) {

            document.getElementById("totalEntries").innerText =
                rows.length - 1;

            let subjects = [];

            for (let i = 1; i < rows.length; i++) {

                if (rows[i][2]) {

                    subjects.push(rows[i][2]);

                }

            }

            const uniqueSubjects = [...new Set(subjects)];

            document.getElementById("subjectCount").innerText =
                uniqueSubjects.length;

        }

        document.getElementById("searchInput")
            .addEventListener("keyup", function () {

                const value = this.value.toLowerCase();

                const filtered = allRows.filter((row, index) => {

                    if (index === 0) return true;

                    return row.join(" ")
                        .toLowerCase()
                        .includes(value);

                });

                generateTable(filtered);

            });

        loadPlanner();

        setInterval(loadPlanner, 10000);

    </script>

</body>

</html>
