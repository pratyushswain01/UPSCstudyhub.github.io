<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UPSChub Planner</title>

    <!-- jsPDF Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: auto;
        }

        .title-box {
            background: linear-gradient(135deg, #001b44, #003b95);
            color: white;
            padding: 25px;
            border-radius: 14px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .title-box h1 {
            font-size: 35px;
            margin-bottom: 10px;
        }

        .title-box p {
            font-size: 16px;
            opacity: 0.9;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .download-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .download-btn:hover {
            background: #0056cc;
        }

        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #007bff;
            color: white;
            padding: 16px;
            font-size: 15px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #e0e0e0;
            text-align: center;
            font-size: 15px;
        }

        tr:nth-child(even) {
            background: #f8fbff;
        }

        tr:hover {
            background: #eef5ff;
            transition: 0.3s;
        }

        .loading {
            text-align: center;
            padding: 30px;
            font-size: 18px;
            color: #007bff;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        @media(max-width:768px) {

            .title-box h1 {
                font-size: 28px;
            }

            th,
            td {
                font-size: 13px;
                padding: 10px;
            }

            .download-btn {
                width: 100%;
            }

            .top-actions {
                justify-content: center;
            }

        }
    </style>
</head>

<body>

    <div class="container">

        <div class="title-box">
            <h1>UPSChub Planner</h1>
            <p>Mission UPSC 2028 • Daily Planner • Strategic Preparation Tracker</p>
        </div>

        <div class="top-actions">
            <button class="download-btn" onclick="downloadPDF()">
                Download Monthly Tracker PDF
            </button>
        </div>

        <div class="table-container">

            <div class="loading" id="loading">
                Loading Planner...
            </div>

            <table id="plannerTable"></table>

        </div>

        <div class="footer">
            UPSChub © 2026 • Smart UPSC Planner System
        </div>

    </div>

    <script>

        const API_KEY = "AIzaSyA3OcSW6qV-gfQEV2NVT0QEfzbt53kUVRc";

        const SHEET_ID = "1zaUOi3WDvBoBhCOEOZaRQgSYGVob9ktcbOTPYlG6v-s";

        const RANGE = "A5:E100";

        const url =
            `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`;

        let plannerRows = [];

        async function loadPlanner() {

            try {

                const response = await fetch(url);

                const data = await response.json();

                console.log(data);

                const rows = data.values;

                plannerRows = rows;

                let tableHTML = "";

                rows.forEach((row, index) => {

                    tableHTML += "<tr>";

                    row.forEach(cell => {

                        if (index === 0) {

                            tableHTML += `<th>${cell}</th>`;

                        }

                        else {

                            tableHTML += `<td>${cell}</td>`;

                        }

                    });

                    tableHTML += "</tr>";

                });

                document.getElementById("plannerTable").innerHTML = tableHTML;

                document.getElementById("loading").style.display = "none";

            }

            catch (error) {

                console.log(error);

                document.getElementById("loading").innerHTML =
                    "Failed to load planner.";

            }

        }

        function downloadPDF() {

            const { jsPDF } = window.jspdf;

            const doc = new jsPDF();

            doc.setFontSize(18);

            doc.text("UPSChub Monthly Planner", 20, 20);

            doc.setFontSize(11);

            let y = 35;

            plannerRows.forEach((row, index) => {

                let line = row.join(" | ");

                doc.text(line, 10, y);

                y += 10;

                if (y > 280) {

                    doc.addPage();

                    y = 20;

                }

            });

            doc.save("Tracker.pdf");

        }

        loadPlanner();

        // Auto refresh every 10 seconds

        setInterval(loadPlanner, 10000);

    </script>

</body>

</html>
