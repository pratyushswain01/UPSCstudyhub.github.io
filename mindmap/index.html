<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#3b82f6">
    <meta name="description" content="UPSChub™ - Premium Interactive Mind Map Learning Platform">
    <title>UPSChub™ - Interactive Mind Map Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <style>
        /* ============================================
           UPSCHUB™ PREMIUM MIND MAP VIEWER
           Created by Pratyush Swain
           All-in-One Advanced System
           ============================================ */

        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;

            --bg-1: #0a0e1a;
            --bg-2: #111827;
            --bg-3: #1f2937;
            --bg-card: rgba(31, 41, 55, 0.6);

            --text-1: #f9fafb;
            --text-2: #d1d5db;
            --text-3: #9ca3af;

            --border: rgba(59, 130, 246, 0.2);
            --border-hover: rgba(59, 130, 246, 0.4);

            --shadow-sm: 0 2px 8px rgba(59, 130, 246, 0.1);
            --shadow-md: 0 4px 16px rgba(59, 130, 246, 0.15);
            --shadow-lg: 0 8px 32px rgba(59, 130, 246, 0.2);
            --shadow-xl: 0 12px 48px rgba(59, 130, 246, 0.25);

            --glow: 0 0 20px rgba(59, 130, 246, 0.4);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;

            --sidebar-width: 340px;
            --topbar-height: 70px;

            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-1: #f8fafc;
            --bg-2: #ffffff;
            --bg-3: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-1: #0f172a;
            --text-2: #334155;
            --text-3: #64748b;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-1);
            color: var(--text-1);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Animated Background */
        .bg-animated {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 20s infinite ease-in-out;
        }

        .particle:nth-child(1) {
            background: var(--primary);
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            background: var(--secondary);
            top: 60%;
            right: 10%;
            animation-delay: 4s;
        }

        .particle:nth-child(3) {
            background: var(--accent);
            bottom: 10%;
            left: 50%;
            animation-delay: 8s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(50px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-30px, 40px) scale(0.9);
            }
        }

        /* Main Layout */
        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform var(--transition);
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
        }

        .logo-icon svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .sidebar-content::-webkit-scrollbar-thumb:hover {
            background: var(--border-hover);
        }

        /* Search */
        .search-box {
            padding: 16px 20px;
            position: relative;
        }

        .search-box svg {
            position: absolute;
            left: 36px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-3);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-1);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-3);
        }

        /* Theme Toggle */
        .theme-toggle-wrapper {
            padding: 0 20px 16px;
        }

        .theme-toggle {
            width: 100%;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            background: var(--bg-3);
            border-color: var(--border-hover);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            color: var(--text-2);
        }

        [data-theme="light"] .sun-icon {
            display: none;
        }

        [data-theme="dark"] .moon-icon {
            display: none;
        }

        .moon-icon {
            display: none;
        }

        [data-theme="light"] .moon-icon {
            display: block;
        }

        /* Continue Learning Section */
        .section {
            padding: 0 20px 16px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            cursor: pointer;
            user-select: none;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .section-title svg {
            width: 16px;
            height: 16px;
        }

        .section-toggle {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            transition: transform var(--transition);
        }

        .section-toggle svg {
            width: 16px;
            height: 16px;
        }

        .section.collapsed .section-toggle {
            transform: rotate(-90deg);
        }

        .section-content {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow: hidden;
            transition: max-height var(--transition), opacity var(--transition);
            opacity: 1;
        }

        .section.collapsed .section-content {
            max-height: 0;
            opacity: 0;
        }

        .recent-item {
            padding: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .recent-item:hover {
            background: var(--bg-3);
            border-color: var(--primary);
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }

        .recent-item h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 4px;
        }

        .recent-item p {
            font-size: 12px;
            color: var(--text-3);
        }

        /* Subject Groups */
        .subject-group {
            margin-bottom: 20px;
        }

        .subject-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .subject-header:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .subject-info-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subject-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .subject-info h3 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 2px;
        }

        .subject-info p {
            font-size: 12px;
            color: var(--text-3);
        }

        .subject-toggle {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-2);
            transition: transform var(--transition);
        }

        .subject-toggle svg {
            width: 18px;
            height: 18px;
        }

        .subject-group.collapsed .subject-toggle {
            transform: rotate(-90deg);
        }

        .chapters-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 2000px;
            overflow: hidden;
            transition: max-height var(--transition), opacity var(--transition);
            opacity: 1;
        }

        .subject-group.collapsed .chapters-list {
            max-height: 0;
            opacity: 0;
        }

        .chapter-item {
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chapter-item:hover {
            background: var(--bg-3);
            border-color: var(--primary);
            transform: translateX(4px);
            box-shadow: var(--shadow-md);
        }

        .chapter-item.active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        .chapter-main {
            flex: 1;
            min-width: 0;
        }

        .chapter-main h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chapter-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar {
            width: 60px;
            height: 4px;
            background: var(--bg-3);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
            transition: width var(--transition);
        }

        .progress-text {
            font-size: 11px;
            color: var(--text-3);
            font-weight: 500;
        }

        .chapter-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .icon-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .icon-btn svg {
            width: 14px;
            height: 14px;
            color: var(--text-3);
        }

        .icon-btn:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .icon-btn.active {
            background: var(--primary);
        }

        .icon-btn.active svg {
            color: white;
        }

        .icon-btn.complete.active {
            background: var(--success);
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }

        .sidebar-footer p {
            font-size: 12px;
            color: var(--text-3);
        }

        .sidebar-footer strong {
            color: var(--primary);
            font-weight: 600;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* Topbar */
        .topbar {
            height: var(--topbar-height);
            background: var(--bg-2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            backdrop-filter: blur(20px);
            z-index: 50;
            flex-shrink: 0;
        }

        .menu-btn {
            display: none;
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-btn svg {
            width: 20px;
            height: 20px;
            color: var(--text-2);
        }

        .menu-btn:hover {
            background: var(--bg-3);
            border-color: var(--border-hover);
        }

        .chapter-info h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 4px;
        }

        .chapter-info p {
            font-size: 13px;
            color: var(--text-3);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
            color: var(--text-2);
        }

        .action-btn:hover {
            background: var(--bg-3);
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .action-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .action-btn.active svg {
            color: white;
        }

        /* Welcome Screen */
        .welcome {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .welcome-content {
            text-align: center;
            max-width: 600px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: var(--glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: var(--glow);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            }
        }

        .welcome-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }

        .welcome-content h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .welcome-content>p {
            font-size: 16px;
            color: var(--text-2);
            margin-bottom: 40px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature {
            padding: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .feature:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .feature svg {
            width: 28px;
            height: 28px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .feature span {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-1);
        }

        .cta-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: var(--glow);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .cta-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Viewer */
        .viewer {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .viewer.active {
            display: block;
        }

        .viewer-wrap {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background: var(--bg-1);
        }

        .viewer-wrap.grabbing {
            cursor: grabbing;
        }

        .viewer-img {
            position: absolute;
            max-width: none;
            user-select: none;
            -webkit-user-drag: none;
            transition: filter 0.2s;
        }

        /* Toolbar */
        .toolbar {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-xl);
            z-index: 10;
            transition: opacity var(--transition), transform var(--transition);
        }

        .toolbar.hidden {
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
        }

        .toolbar-btn {
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toolbar-btn svg {
            width: 18px;
            height: 18px;
            color: var(--text-2);
        }

        .toolbar-btn:hover {
            background: var(--bg-3);
        }

        .toolbar-btn.active {
            background: var(--primary);
        }

        .toolbar-btn.active svg {
            color: white;
        }

        .toolbar-sep {
            width: 1px;
            height: 24px;
            background: var(--border);
            margin: 0 4px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
        }

        .slider-group svg {
            width: 16px;
            height: 16px;
            color: var(--text-3);
        }

        .slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--bg-3);
            border-radius: 2px;
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: var(--shadow-sm);
        }

        /* Minimap */
        .minimap {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 200px;
            height: 150px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            z-index: 10;
            transition: opacity var(--transition);
        }

        .minimap.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .minimap canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .minimap-viewport {
            position: absolute;
            border: 2px solid var(--primary);
            background: rgba(59, 130, 246, 0.1);
            pointer-events: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 5;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--bg-3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading p {
            font-size: 14px;
            color: var(--text-3);
        }

        /* Fullscreen */
        .fullscreen {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.98);
            z-index: 1000;
            display: none;
        }

        .fullscreen.active {
            display: block;
        }

        .fullscreen-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            z-index: 1001;
        }

        .fullscreen-close svg {
            width: 24px;
            height: 24px;
            color: white;
        }

        .fullscreen-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .fullscreen-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fullscreen-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            transition: bottom var(--transition);
        }

        .toast.show {
            bottom: 24px;
        }

        .toast svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
            flex-shrink: 0;
        }

        .toast span {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-1);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 300px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                width: 300px;
                transform: translateX(-100%);
                box-shadow: var(--shadow-xl);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .menu-btn {
                display: flex;
            }

            .topbar {
                padding: 0 16px;
            }

            .chapter-info h2 {
                font-size: 16px;
            }

            .toolbar {
                bottom: 16px;
                padding: 6px;
                gap: 2px;
                max-width: 90%;
            }

            .toolbar-btn {
                width: 36px;
                height: 36px;
            }

            .slider-group {
                display: none;
            }

            .minimap {
                width: 150px;
                height: 112px;
                bottom: 16px;
                right: 16px;
            }

            .welcome-content h1 {
                font-size: 28px;
            }

            .features {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            :root {
                --sidebar-width: 100%;
            }

            .topbar {
                height: 60px;
                padding: 0 12px;
            }

            .action-btn {
                width: 36px;
                height: 36px;
            }
        }

        /* Accessibility */
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Selection */
        ::selection {
            background: rgba(59, 130, 246, 0.3);
            color: var(--text-1);
        }

        /* Prevent flash */
        .no-transition * {
            transition: none !important;
        }
    </style>
</head>

                                            <div class="progress-fill" style="width:${ch.progress}%"></div>
                                        </div>
                                        <span class="progress-text">${ch.progress}%</span>
                                    </div>
                                </div>
                                <div class="chapter-actions">
                                    <div class="icon-btn bookmark ${state.bookmarks.has(ch.id) ? 'active' : ''}" data-id="${ch.id}" data-action="bookmark">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M19 21L12 16L5 21V5A2 2 0 0 1 7 3H17A2 2 0 0 1 19 5Z"/>
                                        </svg>
                                    </div>
                                    <div class="icon-btn complete ${state.completed.has(ch.id) ? 'active' : ''}" data-id="${ch.id}" data-action="complete">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <polyline points="20 6 9 17 4 12"/>
                                        </svg>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Render recent
        function renderRecent() {
            if (state.recent.length === 0) {
                recentChapters.innerHTML = '<p style="font-size:13px;color:var(--text-3);padding:12px">No recent chapters yet</p>';
                return;
            }

            recentChapters.innerHTML = state.recent.slice(0, 3).map(id => {
                const ch = findChapter(id);
                return ch ? `
                    <div class="recent-item" data-chapter="${ch.id}">
                        <h4>${ch.title}</h4>
                        <p>${ch.subject}</p>
                    </div>
                ` : '';
            }).join('');
        }

        // Find chapter
        function findChapter(id) {
            for (const subject of DATA.subjects) {
                const ch = subject.chapters.find(c => c.id === id);
                if (ch) return ch;
            }
            return null;
        }

        // Setup events
        function setupEvents() {
            // Menu
            menuBtn.addEventListener('click', () => sidebar.classList.toggle('active'));

            // Theme
            themeToggle.addEventListener('click', toggleTheme);

            // Search
            searchInput.addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('.chapter-item').forEach(item => {
                    const title = item.querySelector('h4').textContent.toLowerCase();
                    item.style.display = title.includes(q) ? 'flex' : 'none';
                });
            });

            // Continue Learning collapse
            recentSection.querySelector('.section-header').addEventListener('click', () => {
                recentSection.classList.toggle('collapsed');
            });

            // Subjects
            subjectsContainer.addEventListener('click', e => {
                // Subject toggle
                const header = e.target.closest('.subject-header');
                if (header) {
                    header.parentElement.classList.toggle('collapsed');
                }

                // Chapter click
                const item = e.target.closest('.chapter-item');
                if (item && !e.target.closest('.icon-btn')) {
                    loadChapter(item.dataset.chapter);
                    if (window.innerWidth <= 768) sidebar.classList.remove('active');
                }

                // Action buttons
                const btn = e.target.closest('.icon-btn');
                if (btn) {
                    e.stopPropagation();
                    const action = btn.dataset.action;
                    const id = btn.dataset.id;
                    if (action === 'bookmark') toggleBookmark(id);
                    if (action === 'complete') toggleComplete(id);
                }
            });

            // Recent chapters
            recentChapters.addEventListener('click', e => {
                const item = e.target.closest('.recent-item');
                if (item) {
                    loadChapter(item.dataset.chapter);
                    if (window.innerWidth <= 768) sidebar.classList.remove('active');
                }
            });

            // Topbar actions
            $('downloadBtn').addEventListener('click', downloadImage);
            $('shareBtn').addEventListener('click', shareChapter);
            $('bookmarkBtn').addEventListener('click', () => {
                if (state.currentChapter) {
                    toggleBookmark(state.currentChapter.id);
                    $('bookmarkBtn').classList.toggle('active', state.bookmarks.has(state.currentChapter.id));
                }
            });

            // Toolbar
            $('zoomInBtn').addEventListener('click', () => zoom(0.2));
            $('zoomOutBtn').addEventListener('click', () => zoom(-0.2));
            $('resetBtn').addEventListener('click', resetView);
            $('fitBtn').addEventListener('click', fitScreen);
            $('fitWidthBtn').addEventListener('click', fitWidth);
            $('rotateBtn').addEventListener('click', rotate);
            $('handBtn').addEventListener('click', toggleHand);
            $('fullscreenBtn').addEventListener('click', openFullscreen);

            $('brightnessSlider').addEventListener('input', e => {
                state.brightness = e.target.value;
                updateFilters();
            });

            $('contrastSlider').addEventListener('input', e => {
                state.contrast = e.target.value;
                updateFilters();
            });

            // Fullscreen
            fullscreenClose.addEventListener('click', closeFullscreen);

            // Viewer
            setupViewer();

            // Close sidebar on outside click (mobile)
            document.addEventListener('click', e => {
                if (window.innerWidth <= 768 &&
                    sidebar.classList.contains('active') &&
                    !sidebar.contains(e.target) &&
                    !menuBtn.contains(e.target)) {
                    sidebar.classList.remove('active');
                }
            });
        }

        // Setup viewer
        function setupViewer() {
            // Wheel zoom
            viewerWrap.addEventListener('wheel', e => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                zoom(delta, e.clientX, e.clientY);
            }, { passive: false });

            // Mouse drag
            viewerWrap.addEventListener('mousedown', startPan);
            document.addEventListener('mousemove', pan);
            document.addEventListener('mouseup', endPan);

            // Touch
            let touchDist = 0, touchScale = 1;

            viewerWrap.addEventListener('touchstart', e => {
                if (e.touches.length === 2) {
                    touchDist = getTouchDist(e.touches);
                    touchScale = state.zoom;
                } else if (e.touches.length === 1) {
                    startPan(e.touches[0]);
                }
            });

            viewerWrap.addEventListener('touchmove', e => {
                e.preventDefault();
                if (e.touches.length === 2) {
                    const dist = getTouchDist(e.touches);
                    state.zoom = Math.max(0.5, Math.min(5, (dist / touchDist) * touchScale));
                    updateTransform();
                } else if (e.touches.length === 1 && state.isPanning) {
                    pan(e.touches[0]);
                }
            }, { passive: false });

            viewerWrap.addEventListener('touchend', endPan);

            // Double tap zoom
            let lastTap = 0;
            viewerWrap.addEventListener('click', e => {
                const now = Date.now();
                if (now - lastTap < 300) {
                    const amt = state.zoom < 2 ? 1 : -state.zoom + 1;
                    zoom(amt, e.clientX, e.clientY);
                }
                lastTap = now;
            });

            // Auto-hide toolbar
            let hideTimeout;
            viewerWrap.addEventListener('mousemove', () => {
                toolbar.classList.remove('hidden');
                clearTimeout(hideTimeout);
                hideTimeout = setTimeout(() => toolbar.classList.add('hidden'), 3000);
            });

            // Minimap click
            minimapCanvas.addEventListener('click', e => {
                const rect = minimapCanvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width;
                const y = (e.clientY - rect.top) / rect.height;
                const img = viewerImg;
                state.translateX = -x * img.naturalWidth * state.zoom + viewerWrap.offsetWidth / 2;
                state.translateY = -y * img.naturalHeight * state.zoom + viewerWrap.offsetHeight / 2;
                updateTransform();
                updateMinimap();
            });
        }

        // Touch distance
        function getTouchDist(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Pan
        function startPan(e) {
            state.isPanning = true;
            state.startX = (e.clientX || e.pageX) - state.translateX;
            state.startY = (e.clientY || e.pageY) - state.translateY;
            viewerWrap.classList.add('grabbing');
            state.velocity = { x: 0, y: 0 };
            state.lastMoveTime = Date.now();
        }

        function pan(e) {
            if (!state.isPanning) return;
            const x = e.clientX || e.pageX;
            const y = e.clientY || e.pageY;
            const newX = x - state.startX;
            const newY = y - state.startY;
            const now = Date.now();
            const dt = now - state.lastMoveTime;
            if (dt > 0) {
                state.velocity.x = (newX - state.translateX) / dt * 16;
                state.velocity.y = (newY - state.translateY) / dt * 16;
            }
            state.translateX = newX;
            state.translateY = newY;
            state.lastMoveTime = now;
            updateTransform();
            updateMinimap();
        }

        function endPan() {
            if (!state.isPanning) return;
            state.isPanning = false;
            viewerWrap.classList.remove('grabbing');
            applyMomentum();
        }

        // Momentum
        function applyMomentum() {
            const friction = 0.95;
            const min = 0.5;
            function animate() {
                if (Math.abs(state.velocity.x) < min && Math.abs(state.velocity.y) < min) return;
                state.translateX += state.velocity.x;
                state.translateY += state.velocity.y;
                state.velocity.x *= friction;
                state.velocity.y *= friction;
                updateTransform();
                updateMinimap();
                requestAnimationFrame(animate);
            }
            if (Math.abs(state.velocity.x) >= min || Math.abs(state.velocity.y) >= min) {
                requestAnimationFrame(animate);
            }
        }

        // Zoom
        function zoom(delta, cx, cy) {
            const oldZoom = state.zoom;
            state.zoom = Math.max(0.5, Math.min(5, state.zoom + delta));
            if (cx !== undefined && cy !== undefined) {
                const rect = viewerWrap.getBoundingClientRect();
                const x = cx - rect.left;
                const y = cy - rect.top;
                state.translateX = x - (x - state.translateX) * (state.zoom / oldZoom);
                state.translateY = y - (y - state.translateY) * (state.zoom / oldZoom);
            }
            updateTransform();
            updateMinimap();
        }

        // Update transform
        function updateTransform() {
            viewerImg.style.transform = `
                translate(${state.translateX}px, ${state.translateY}px)
                scale(${state.zoom})
                rotate(${state.rotation}deg)
            `;
        }

        // Update filters
        function updateFilters() {
            viewerImg.style.filter = `brightness(${state.brightness}%) contrast(${state.contrast}%)`;
        }

        // Reset view
        function resetView() {
            state.zoom = 1;
            state.rotation = 0;
            state.brightness = 100;
            state.contrast = 100;
            state.translateX = 0;
            state.translateY = 0;
            $('brightnessSlider').value = 100;
            $('contrastSlider').value = 100;
            updateTransform();
            updateFilters();
            updateMinimap();
            showToast('View reset');
        }

        // Fit screen
        function fitScreen() {
            const img = viewerImg;
            const wrap = viewerWrap;
            const scaleX = wrap.offsetWidth / img.naturalWidth;
            const scaleY = wrap.offsetHeight / img.naturalHeight;
            state.zoom = Math.min(scaleX, scaleY) * 0.9;
            state.translateX = (wrap.offsetWidth - img.naturalWidth * state.zoom) / 2;
            state.translateY = (wrap.offsetHeight - img.naturalHeight * state.zoom) / 2;
            updateTransform();
            updateMinimap();
            showToast('Fit to screen');
        }

        // Fit width
        function fitWidth() {
            const img = viewerImg;
            const wrap = viewerWrap;
            state.zoom = (wrap.offsetWidth / img.naturalWidth) * 0.95;
            state.translateX = (wrap.offsetWidth - img.naturalWidth * state.zoom) / 2;
            state.translateY = (wrap.offsetHeight - img.naturalHeight * state.zoom) / 2;
            updateTransform();
            updateMinimap();
            showToast('Fit to width');
        }

        // Rotate
        function rotate() {
            state.rotation = (state.rotation + 90) % 360;
            updateTransform();
            showToast('Rotated 90°');
        }

        // Toggle hand
        function toggleHand() {
            const btn = $('handBtn');
            btn.classList.toggle('active');
            viewerWrap.style.cursor = btn.classList.contains('active') ? 'grab' : 'default';
            showToast(btn.classList.contains('active') ? 'Hand tool on' : 'Hand tool off');
        }

        // Update minimap
        function updateMinimap() {
            if (!state.currentChapter) return;
            const canvas = minimapCanvas;
            const ctx = canvas.getContext('2d');
            const img = viewerImg;
            canvas.width = 200;
            canvas.height = 150;
            const scale = Math.min(canvas.width / img.naturalWidth, canvas.height / img.naturalHeight);
            const w = img.naturalWidth * scale;
            const h = img.naturalHeight * scale;
            const ox = (canvas.width - w) / 2;
            const oy = (canvas.height - h) / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, ox, oy, w, h);
            const vs = scale / state.zoom;
            const vx = ox - state.translateX * vs;
            const vy = oy - state.translateY * vs;
            const vw = viewerWrap.offsetWidth * vs;
            const vh = viewerWrap.offsetHeight * vs;
            minimapViewport.style.left = `${vx}px`;
            minimapViewport.style.top = `${vy}px`;
            minimapViewport.style.width = `${vw}px`;
            minimapViewport.style.height = `${vh}px`;
        }

        // Load chapter
        function loadChapter(id) {
            const ch = findChapter(id);
            if (!ch) return;
            state.currentChapter = ch;
            welcomeScreen.style.display = 'none';
            viewer.classList.add('active');
            loading.style.display = 'flex';
            document.querySelector('.chapter-info h2').textContent = ch.title;
            document.querySelector('.chapter-info p').textContent = ch.subject;
            $('bookmarkBtn').classList.toggle('active', state.bookmarks.has(ch.id));
            document.querySelectorAll('.chapter-item').forEach(item => {
                item.classList.toggle('active', item.dataset.chapter === id);
            });
            const img = new Image();
            img.onload = () => {
                viewerImg.src = img.src;
                viewerImg.style.width = `${img.naturalWidth}px`;
                viewerImg.style.height = `${img.naturalHeight}px`;
                loading.style.display = 'none';
                resetView();
                fitScreen();
                setTimeout(() => updateMinimap(), 100);
                showToast(`Loaded: ${ch.title}`);
            };
            img.onerror = () => {
                loading.style.display = 'none';
                showToast('Failed to load image');
            };
            img.src = ch.imageUrl;
            state.recent = state.recent.filter(i => i !== id);
            state.recent.unshift(id);
            state.recent = state.recent.slice(0, 10);
            renderRecent();
            saveState();
        }

        // Toggle bookmark
        function toggleBookmark(id) {
            if (state.bookmarks.has(id)) {
                state.bookmarks.delete(id);
                showToast('Bookmark removed');
            } else {
                state.bookmarks.add(id);
                showToast('Bookmarked');
            }
            document.querySelectorAll(`.icon-btn.bookmark[data-id="${id}"]`).forEach(btn => {
                btn.classList.toggle('active', state.bookmarks.has(id));
            });
            if (state.currentChapter?.id === id) {
                $('bookmarkBtn').classList.toggle('active', state.bookmarks.has(id));
            }
            saveState();
        }

        // Toggle complete
        function toggleComplete(id) {
            if (state.completed.has(id)) {
                state.completed.delete(id);
                showToast('Marked incomplete');
            } else {
                state.completed.add(id);
                showToast('Marked complete');
            }
            document.querySelectorAll(`.icon-btn.complete[data-id="${id}"]`).forEach(btn => {
                btn.classList.toggle('active', state.completed.has(id));
            });
            saveState();
        }

        // Download
        function downloadImage() {
            if (!state.currentChapter) return;
            const a = document.createElement('a');
            a.href = viewerImg.src;
            a.download = `${state.currentChapter.title.replace(/\s+/g, '_')}.jpg`;
            a.click();
            showToast('Download started');
        }

        // Share
        function shareChapter() {
            if (!state.currentChapter) return;
            if (navigator.share) {
                navigator.share({
                    title: `UPSChub™ - ${state.currentChapter.title}`,
                    text: `Check out: ${state.currentChapter.title}`,
                    url: window.location.href
                }).catch(() => { });
            } else {
                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied');
            }
        }

        // Fullscreen
        function openFullscreen() {
            if (!state.currentChapter) return;
            fullscreenImg.src = viewerImg.src;
            fullscreen.classList.add('active');
            if (fullscreen.requestFullscreen) {
                fullscreen.requestFullscreen();
            } else if (fullscreen.webkitRequestFullscreen) {
                fullscreen.webkitRequestFullscreen();
            }
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => { });
            }
        }

        function closeFullscreen() {
            fullscreen.classList.remove('active');
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
            if (screen.orientation && screen.orientation.unlock) {
                screen.orientation.unlock();
            }
        }

        // Theme
        function toggleTheme() {
            const curr = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = curr === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('upschub_theme', next);
            showToast(`${next === 'dark' ? 'Dark' : 'Light'} mode`);
        }

        function checkTheme() {
            const saved = localStorage.getItem('upschub_theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        }

        // Toast
        function showToast(msg) {
            toast.querySelector('span').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Keyboard
        function setupKeyboard() {
            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT') return;
                switch (e.key) {
                    case '=':
                    case '+':
                        e.preventDefault();
                        zoom(0.2);
                        break;
                    case '-':
                    case '_':
                        e.preventDefault();
                        zoom(-0.2);
                        break;
                    case 'r':
                    case 'R':
                        e.preventDefault();
                        resetView();
                        break;
                    case 'f':
                    case 'F':
                        e.preventDefault();
                        openFullscreen();
                        break;
                    case 'h':
                    case 'H':
                        e.preventDefault();
                        toggleHand();
                        break;
                    case 'Escape':
                        if (fullscreen.classList.contains('active')) closeFullscreen();
                        break;
                }
            });
        }

        // Resize
        window.addEventListener('resize', () => {
            if (state.currentChapter) updateMinimap();
        });

        // Prevent context menu
        viewerImg.addEventListener('contextmenu', e => e.preventDefault());
        fullscreenImg.addEventListener('contextmenu', e => e.preventDefault());

        // Start
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
