<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>UPSChub™ - Interactive Mind Map Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Animated Background -->
    <div class="animated-background">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <!-- Main Container -->
    <div class="main-container">

        <!-- Left Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" />
                            <path d="M2 17L12 22L22 17" />
                            <path d="M2 12L12 17L22 12" />
                        </svg>
                    </div>
                    <h1>UPSChub™</h1>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
            </div>

            <!-- Search Bar -->
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="M21 21L16.65 16.65" />
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search chapters...">
            </div>

            <!-- Theme Toggle -->
            <div class="theme-toggle-container">
                <button class="theme-toggle" id="themeToggle">
                    <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
            </div>

            <!-- Recent Chapters -->
            <div class="recent-section">
                <h3 class="section-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    Continue Learning
                </h3>
                <div class="recent-chapters" id="recentChapters">
                    <!-- Recent chapters will be loaded here -->
                </div>
            </div>

            <!-- Subjects List -->
            <div class="subjects-container" id="subjectsContainer">
                <!-- Subjects will be loaded here -->
            </div>

            <!-- Footer -->
            <div class="sidebar-footer">
                <p>Created by <strong>Pratyush Swain</strong></p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">

            <!-- Top Bar -->
            <div class="top-bar">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <div class="chapter-info" id="chapterInfo">
                    <h2 class="chapter-title">Select a chapter to begin</h2>
                    <p class="chapter-subject">UPSChub™ Interactive Mind Maps</p>
                </div>
                <div class="top-bar-actions">
                    <button class="action-btn" id="downloadBtn" title="Download">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V15" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                    </button>
                    <button class="action-btn" id="shareBtn" title="Share">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="18" cy="5" r="3" />
                            <circle cx="6" cy="12" r="3" />
                            <circle cx="18" cy="19" r="3" />
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
                        </svg>
                    </button>
                    <button class="action-btn bookmark-btn" id="bookmarkBtn" title="Bookmark">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21L12 16L5 21V5A2 2 0 0 1 7 3H17A2 2 0 0 1 19 5Z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <div class="welcome-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" />
                            <path d="M2 17L12 22L22 17" />
                            <path d="M2 12L12 17L22 12" />
                        </svg>
                    </div>
                    <h1>Welcome to UPSChub™</h1>
                    <p>Your premium interactive mind map learning platform</p>
                    <div class="welcome-features">
                        <div class="feature">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12" />
                            </svg>
                            <span>Interactive Mind Maps</span>
                        </div>
                        <div class="feature">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6A2 2 0 0 0 4 4V20A2 2 0 0 0 6 22H18A2 2 0 0 0 20 20V8Z" />
                                <polyline points="14 2 14 8 20 8" />
                            </svg>
                            <span>Organized by Subjects</span>
                        </div>
                        <div class="feature">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                            <span>Track Your Progress</span>
                        </div>
                    </div>
                    <button class="cta-button" onclick="document.querySelector('.chapter-item').click()">
                        Start Learning
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            <polyline points="12 5 19 12 12 19" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Image Viewer Container -->
            <div class="viewer-container" id="viewerContainer">
                <div class="viewer-wrapper" id="viewerWrapper">
                    <img id="mindMapImage" class="mind-map-image" alt="Mind Map">
                </div>

                <!-- Floating Toolbar -->
                <div class="floating-toolbar" id="floatingToolbar">
                    <button class="toolbar-btn" id="zoomInBtn" title="Zoom In (=)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="11" y1="8" x2="11" y2="14" />
                            <line x1="8" y1="11" x2="14" y2="11" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="zoomOutBtn" title="Zoom Out (-)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="8" y1="11" x2="14" y2="11" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="resetBtn" title="Reset (R)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="1 4 1 10 7 10" />
                            <path d="M3.51 15A9 9 0 1 0 2.13 9.36L1 10" />
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="fitScreenBtn" title="Fit Screen">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M8 3H5A2 2 0 0 0 3 5V8M21 8V5A2 2 0 0 0 19 3H16M16 21H19A2 2 0 0 0 21 19V16M3 16V19A2 2 0 0 0 5 21H8" />
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="fitWidthBtn" title="Fit Width">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="5 9 2 12 5 15" />
                            <polyline points="19 9 22 12 19 15" />
                            <line x1="2" y1="12" x2="22" y2="12" />
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="rotateBtn" title="Rotate">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.5 2V8H15.5" />
                            <path d="M21.34 5.66A10 10 0 1 1 3.51 8.5" />
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="handToolBtn" title="Hand Tool (H)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M18 11V6A2 2 0 0 0 14 6V4A2 2 0 0 0 10 4V6A2 2 0 0 0 6 6V11A2 2 0 0 0 2 11V16A6 6 0 0 0 14 16V11A2 2 0 0 0 18 11Z" />
                        </svg>
                    </button>
                    <button class="toolbar-btn" id="fullscreenBtn" title="Fullscreen (F)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path
                                d="M8 3H5A2 2 0 0 0 3 5V8M21 8V5A2 2 0 0 0 19 3H16M16 21H19A2 2 0 0 0 21 19V16M3 16V19A2 2 0 0 0 5 21H8" />
                        </svg>
                    </button>

                    <div class="toolbar-separator"></div>

                    <div class="toolbar-slider-group">
                        <label for="brightnessSlider" title="Brightness">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="5" />
                                <line x1="12" y1="1" x2="12" y2="3" />
                                <line x1="12" y1="21" x2="12" y2="23" />
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                                <line x1="1" y1="12" x2="3" y2="12" />
                                <line x1="21" y1="12" x2="23" y2="12" />
                            </svg>
                        </label>
                        <input type="range" id="brightnessSlider" min="50" max="150" value="100" class="toolbar-slider">
                    </div>

                    <div class="toolbar-slider-group">
                        <label for="contrastSlider" title="Contrast">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 2A10 10 0 0 0 12 22Z" />
                            </svg>
                        </label>
                        <input type="range" id="contrastSlider" min="50" max="150" value="100" class="toolbar-slider">
                    </div>
                </div>

                <!-- Mini Map Navigator -->
                <div class="mini-map" id="miniMap">
                    <canvas id="miniMapCanvas"></canvas>
                    <div class="mini-map-viewport" id="miniMapViewport"></div>
                </div>

                <!-- Loading Indicator -->
                <div class="loading-indicator" id="loadingIndicator">
                    <div class="loader"></div>
                    <p>Loading mind map...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Fullscreen Overlay -->
    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <button class="fullscreen-close" id="fullscreenClose">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
        <div class="fullscreen-content" id="fullscreenContent">
            <img id="fullscreenImage" class="fullscreen-image" alt="Mind Map Fullscreen">
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12" />
        </svg>
        <span class="toast-message"></span>
    </div>

    <!-- Scripts -->
    <script src="firebase.js"></script>
    <script src="script.js"></script>
</body>

</html>
