<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Youth Parliament Scripts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", Arial, sans-serif;
}

body{
background:#f4f6fb;
color:#333;
}

/* HEADER */

header{
background:#0b5ed7;
color:white;
padding:14px 20px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:36px;
}

.logo span{
font-size:20px;
font-weight:600;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:25px 16px;
}

.title{
text-align:center;
margin-bottom:25px;
color:#0b5ed7;
font-size:26px;
}

/* TABLE */

.table-wrapper{
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

th, td{
padding:14px;
text-align:left;
border-bottom:1px solid #eee;
}

th{
background:#eef3ff;
font-weight:600;
}

tr:hover{
background:#fafafa;
}

/* BUTTON */

.view-btn{
background:#0b5ed7;
color:white;
padding:8px 16px;
border-radius:6px;
text-decoration:none;
font-size:14px;
display:inline-block;
}

.view-btn:hover{
background:#084298;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
margin-top:40px;
background:#fff;
border-top:1px solid #ddd;
font-size:14px;
color:#666;
}

/* MOBILE CARDS */

@media(max-width:600px){

table, thead, tbody, th, td, tr{
display:block;
}

thead{
display:none;
}

tr{
background:white;
margin-bottom:15px;
border-radius:10px;
padding:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

td{
border:none;
padding:6px 0;
}

td:before{
font-weight:bold;
display:block;
color:#555;
}

td:nth-child(1):before{
content:"Sl No";
}

td:nth-child(2):before{
content:"Script Title";
}

td:nth-child(3):before{
content:"Action";
}

}

</style>

</head>



<body>


<header>

<div class="logo">
<img src="logo.png" alt="logo">
<span>Youth Parliament</span>
</div>

</header>



<div class="container">

<h1 class="title">Union Budget 2026 – Youth Parliament Scripts</h1>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>Sl No</th>
<th>Script Title</th>
<th>View</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Union budget script 1</td>
<td>
<a href="script1.html" class="view-btn">View Script</a>
</td>
</tr>

<tr>
<td>2</td>
<td>Union Budget 2026: Strengthening the Youth Path Towards Viksit Bharat 2047 ( Script 2 )</td>
<td>
<a href="script2.html" class="view-btn">View Script</a>
</td>
</tr>

</tbody>

</table>

</div>

</div>



<footer>

© Youth Parliament Resources | UPSC Study Hub

</footer>


</body>
</html>
