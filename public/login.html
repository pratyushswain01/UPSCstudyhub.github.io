<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSChub — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --bg2: #111218;
    --bg3: #16181f;
    --surface: #1e2030;
    --surface2: #252840;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --text2: #9094a8;
    --text3: #5c6079;
    --accent: #6c63ff;
    --accent3: #a78bfa;
    --teal: #0ed8b4;
    --coral: #f87171;
    --green: #34d399;
    --gradient: linear-gradient(135deg, #6c63ff, #8b5cf6, #0ed8b4);
    --gradient2: linear-gradient(135deg, #6c63ff 0%, #0ed8b4 100%);
    --font: 'Outfit', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --glow: 0 0 40px rgba(108,99,255,0.3);
    --shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── ANIMATED BACKGROUND ── */
  .bg-orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: orbFloat 12s ease-in-out infinite;
  }

  .orb1 {
    width: 500px; height: 500px;
    background: #6c63ff;
    top: -150px; left: -150px;
    animation-delay: 0s;
  }

  .orb2 {
    width: 400px; height: 400px;
    background: #0ed8b4;
    bottom: -100px; right: -100px;
    animation-delay: -4s;
  }

  .orb3 {
    width: 300px; height: 300px;
    background: #8b5cf6;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -8s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  /* ── GRID PATTERN ── */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* ── LOGIN CARD ── */
  .login-wrapper {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 440px;
    padding: 20px;
    animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 40px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gradient);
  }

  /* ── LOGO ── */
  .logo-section {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-icon-big {
    width: 64px; height: 64px;
    background: var(--gradient);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900; color: white;
    margin: 0 auto 16px;
    box-shadow: var(--glow);
  }

  .logo-title {
    font-size: 28px; font-weight: 700;
    background: var(--gradient2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  .logo-subtitle {
    font-size: 13px;
    color: var(--text3);
    font-family: var(--mono);
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
  }

  .divider-line {
    flex: 1; height: 1px; background: var(--border);
  }

  .divider-text {
    font-size: 11px; color: var(--text3);
    font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px;
  }

  /* ── GOOGLE BUTTON ── */
  .btn-google {
    width: 100%;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    padding: 14px 20px;
    background: white;
    border: none;
    border-radius: 12px;
    font-size: 15px; font-weight: 600;
    color: #1a1a2e;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    margin-bottom: 16px;
  }

  .btn-google:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .btn-google:active { transform: translateY(0); }

  .btn-google svg { flex-shrink: 0; }

  /* ── EMAIL FORM ── */
  .form-group { margin-bottom: 16px; }

  .form-label {
    font-size: 11px; font-weight: 600; color: var(--text3);
    font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 6px; display: block;
  }

  .form-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .form-input::placeholder { color: var(--text3); }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--gradient);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    margin-top: 4px;
  }

  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(108,99,255,0.45); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── TOGGLE LOGIN/REGISTER ── */
  .toggle-mode {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text3);
  }

  .toggle-mode span {
    color: var(--accent3);
    cursor: pointer;
    font-weight: 600;
    transition: color 0.2s;
  }

  .toggle-mode span:hover { color: var(--teal); }

  /* ── ERROR / SUCCESS ── */
  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--coral); display: flex; }
  .alert.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--green); display: flex; }
  .alert.hidden { display: none !important; }

  /* ── LOADING SPINNER ── */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FEATURES STRIP ── */
  .features {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .feature-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text3); font-family: var(--mono);
  }

  .feature-dot {
    width: 6px; height: 6px; border-radius: 50%;
  }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .loading-overlay.show { display: flex; }

  .loading-logo {
    width: 56px; height: 56px;
    background: var(--gradient);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 900; color: white;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }

  .loading-text {
    font-size: 14px; color: var(--text3); font-family: var(--mono);
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="bg-grid"></div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo">U</div>
  <div class="loading-text">Signing you in…</div>
</div>

<!-- Login Card -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-icon-big">U</div>
      <div class="logo-title">UPSChub</div>
      <div class="logo-subtitle">AI Productivity Engine v2.0</div>
    </div>

    <!-- Alert -->
    <div class="alert hidden" id="alert-box">
      <span id="alert-icon">⚠</span>
      <span id="alert-msg"></span>
    </div>

    <!-- Google Sign In -->
    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or use email</div>
      <div class="divider-line"></div>
    </div>

    <!-- Email Form -->
    <div id="login-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" id="email-input" type="email" placeholder="alex@example.com" onkeypress="if(event.key==='Enter') handleEmailAuth()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="password-input" type="password" placeholder="••••••••" onkeypress="if(event.key==='Enter') handleEmailAuth()">
      </div>
      <button class="btn-primary" id="auth-btn" onclick="handleEmailAuth()">
        <span id="btn-text">Sign In</span>
        <div class="spinner" id="btn-spinner"></div>
      </button>
    </div>

    <div class="toggle-mode" id="toggle-mode">
      Don't have an account? <span onclick="toggleMode()">Create one</span>
    </div>

    <!-- Features -->
    <div class="features">
      <div class="feature-item"><div class="feature-dot" style="background:#6c63ff"></div>AI Tasks</div>
      <div class="feature-item"><div class="feature-dot" style="background:#0ed8b4"></div>Streak Tracking</div>
      <div class="feature-item"><div class="feature-dot" style="background:#f59e0b"></div>Notifications</div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup,
           signInWithEmailAndPassword, createUserWithEmailAndPassword,
           onAuthStateChanged }                     from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

  const firebaseConfig = {
    apiKey:            'AIzaSyBoPtr3d8se-fcGXkzixG8OE7dFvYjPcs4',
    authDomain:        'upscstudyhub-github.firebaseapp.com',
    projectId:         'upscstudyhub-github',
    storageBucket:     'upscstudyhub-github.firebasestorage.app',
    messagingSenderId: '451692540885',
    appId:             '1:451692540885:web:b425e85128e5de97c7c35c',
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: 'select_account' }); // ← ADD THIS

  let isRegisterMode = false;

  // ── If already logged in → redirect to app ──
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('loading-overlay').classList.add('show');
      window.location.href = '/app';
    }
  });

  // ── Google Sign In ──
  window.signInWithGoogle = async function() {
    try {
      showLoading(true);
      await signInWithPopup(auth, provider);
      // onAuthStateChanged will handle redirect
    } catch (err) {
      showLoading(false);
      showAlert(friendlyError(err.code), 'error');
    }
  };

  // ── Email Auth ──
  window.handleEmailAuth = async function() {
    const email    = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;

    if (!email || !password) {
      showAlert('Please enter your email and password.', 'error');
      return;
    }

    setButtonLoading(true);
    clearAlert();

    try {
      if (isRegisterMode) {
        await createUserWithEmailAndPassword(auth, email, password);
      } else {
        await signInWithEmailAndPassword(auth, email, password);
      }
      // onAuthStateChanged handles redirect
    } catch (err) {
      setButtonLoading(false);
      showAlert(friendlyError(err.code), 'error');
    }
  };

  // ── Toggle login / register ──
  window.toggleMode = function() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('btn-text').textContent   = isRegisterMode ? 'Create Account' : 'Sign In';
    document.getElementById('toggle-mode').innerHTML  = isRegisterMode
      ? 'Already have an account? <span onclick="toggleMode()">Sign in</span>'
      : 'Don\'t have an account? <span onclick="toggleMode()">Create one</span>';
    clearAlert();
  };

  // ── Helpers ──
  function showLoading(show) {
    document.getElementById('loading-overlay').classList.toggle('show', show);
  }

  function setButtonLoading(loading) {
    const btn     = document.getElementById('auth-btn');
    const text    = document.getElementById('btn-text');
    const spinner = document.getElementById('btn-spinner');
    btn.disabled          = loading;
    text.style.display    = loading ? 'none' : 'inline';
    spinner.style.display = loading ? 'block' : 'none';
  }

  function showAlert(msg, type) {
    const box = document.getElementById('alert-box');
    box.className = `alert ${type}`;
    document.getElementById('alert-msg').textContent = msg;
    document.getElementById('alert-icon').textContent = type === 'error' ? '⚠' : '✓';
  }

  function clearAlert() {
    document.getElementById('alert-box').className = 'alert hidden';
  }

  function friendlyError(code) {
    const map = {
      'auth/user-not-found':      'No account found with this email.',
      'auth/wrong-password':      'Incorrect password. Please try again.',
      'auth/email-already-in-use':'An account with this email already exists.',
      'auth/weak-password':       'Password must be at least 6 characters.',
      'auth/invalid-email':       'Please enter a valid email address.',
      'auth/popup-closed-by-user':'Sign-in cancelled. Please try again.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/invalid-credential':  'Invalid email or password.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
